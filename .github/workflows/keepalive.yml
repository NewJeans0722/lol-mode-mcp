# Render 免費方案閒置 15 分鐘會休眠,冷啟動要 30~60 秒 —— 訪客的「卡」
# 主要來自這裡。ping onrender 原生網址(不經 Cloudflare,確保真的喚醒 origin)。
# ⚠️ GitHub Actions 排程在免費版常延遲甚至跳過(可能 >15 分沒跑到 → 還是睡著)。
# 更可靠的做法是外部監控(UptimeRobot 免費,每 5 分鐘 ping)——見 DOMAIN_SETUP.md。
# 這裡當備援,縮到每 10 分鐘。repo 60 天沒 commit 會被 GitHub 停用排程(會寄信)。
name: keepalive
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: ping site
        run: curl -fsS -m 90 -o /dev/null https://lol-mode-mcp.onrender.com/ || true
